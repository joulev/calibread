name: Build Calibread

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -project CalibreRead.xcodeproj -scheme CalibreRead

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project CalibreRead.xcodeproj \
            -scheme CalibreRead \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | xcpretty

      - name: Package app
        run: |
          APP_PATH="build/Build/Products/Release/Calibread.app"
          ditto -c -k --keepParent "$APP_PATH" Calibread.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calibread-${{ github.sha }}
          path: Calibread.zip

